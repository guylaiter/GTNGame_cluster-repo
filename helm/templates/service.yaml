apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-backend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.appName }}
    component: backend

